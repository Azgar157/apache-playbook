---
- name: Apache installation
  hosts: all
  become: true

  tasks:
    - name: Install apache
      apt:
        name: apache2
        state: present
        update_cache: true

    - name: Start apache service
      service:
        name: apache2
        state: started
        enabled: true

    - name: Copy test.html
      copy:
        src: test.html
        dest: /var/www/html/index.html
        mode: '0644'
